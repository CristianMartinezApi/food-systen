services:
  # Frontend (Next.js)
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - food-network

  # Backend (Node.js/Express)
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    command: sh -c "npx prisma db push --accept-data-loss && npm start"
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/food_db
    depends_on:
      - db
    networks:
      - food-network

  # Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=food_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - food-network

networks:
  food-network:
    driver: bridge

volumes:
  postgres_data:
